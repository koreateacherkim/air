<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우주 비행기 슈팅 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            touch-action: none; /* 모바일에서 스크롤 방지 */
        }
        canvas {
            display: block;
        }
        /* 네온 텍스트 효과 */
        .neon-text {
            color: #fff;
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #0ff,
                0 0 40px #0ff,
                0 0 80px #0ff;
        }
        #gameUI {
            pointer-events: none; /* UI 요소가 클릭을 방해하지 않도록 함 */
        }
        .interactive-btn {
            pointer-events: auto;
        }
    </style>
</head>
<body class="relative text-white font-sans selection:bg-none">

    <!-- 게임 캔버스 -->
    <canvas id="gameCanvas"></canvas>

    <!-- 게임 내 정보 UI (점수, 레벨 등) -->
    <div id="gameUI" class="absolute top-0 left-0 w-full h-full p-4 flex flex-col justify-between hidden">
        <div class="flex justify-between items-start text-xl md:text-2xl font-bold">
            <div>
                <div class="text-cyan-400 drop-shadow-md">점수: <span id="scoreDisplay">0</span></div>
                <div class="text-yellow-400 drop-shadow-md mt-1">무기 레벨: <span id="weaponDisplay">1</span></div>
            </div>
            <div class="text-pink-400 drop-shadow-md">레벨: <span id="levelDisplay">1</span></div>
        </div>
        
        <!-- 체력바 -->
        <div class="mb-4">
            <div class="text-sm font-bold mb-1 text-red-400">체력</div>
            <div class="w-48 h-4 bg-gray-800 rounded-full overflow-hidden border border-gray-600">
                <div id="healthBar" class="h-full bg-red-500 transition-all duration-200" style="width: 100%;"></div>
            </div>
        </div>
    </div>

    <!-- 시작 / 게임오버 스크린 -->
    <div id="menuScreen" class="absolute top-0 left-0 w-full h-full flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm z-50">
        <h1 id="menuTitle" class="text-5xl md:text-7xl font-bold mb-4 neon-text text-center">우주 슈팅</h1>
        <p id="menuDesc" class="text-gray-300 text-center mb-8 max-w-md px-4">
            마우스나 터치로 비행기를 이동하세요.<br>
            <span class="text-yellow-400">P 아이템</span>을 먹으면 무기가 업그레이드 됩니다.<br>
            <span class="text-pink-400">1000점</span>마다 난이도가 올라갑니다!
        </p>
        <div id="finalScore" class="hidden text-3xl font-bold text-cyan-400 mb-8">최종 점수: <span id="finalScoreNum">0</span></div>
        <button id="startBtn" class="interactive-btn px-8 py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-full text-xl transition-all shadow-[0_0_15px_rgba(0,255,255,0.5)] active:scale-95">
            게임 시작
        </button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI 요소들
        const gameUI = document.getElementById('gameUI');
        const menuScreen = document.getElementById('menuScreen');
        const menuTitle = document.getElementById('menuTitle');
        const menuDesc = document.getElementById('menuDesc');
        const finalScoreDiv = document.getElementById('finalScore');
        const finalScoreNum = document.getElementById('finalScoreNum');
        const startBtn = document.getElementById('startBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const levelDisplay = document.getElementById('levelDisplay');
        const weaponDisplay = document.getElementById('weaponDisplay');
        const healthBar = document.getElementById('healthBar');

        let width, height;
        
        // 창 크기 조절 대응
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 게임 상태 변수 ---
        let isPlaying = false;
        let score = 0;
        let level = 1;
        let frameCount = 0;
        let animationId;
        
        // 난이도 조절 변수
        let enemySpawnRate = 60; // 작을수록 자주 생성됨 (프레임 단위)
        let enemyBaseSpeed = 2;

        // 게임 객체 배열
        let stars = [];
        let bullets = [];
        let enemies = [];
        let items = [];
        let particles = [];
        let floatingTexts = []; // 레벨업 등의 안내 텍스트

        // --- 입력 처리 ---
        const mouse = { x: width / 2, y: height - 100 };
        let isTouching = false;

        function updateMousePos(x, y) {
            // 플레이어가 화면 밖으로 나가지 않도록 제한
            mouse.x = Math.max(20, Math.min(width - 20, x));
            mouse.y = Math.max(20, Math.min(height - 20, y));
        }

        window.addEventListener('mousemove', (e) => {
            if(isPlaying) updateMousePos(e.clientX, e.clientY);
        });

        window.addEventListener('touchmove', (e) => {
            if(isPlaying) {
                e.preventDefault(); // 스크롤 방지
                updateMousePos(e.touches[0].clientX, e.touches[0].clientY - 40); // 터치 위치보다 살짝 위에 비행기가 오도록
            }
        }, { passive: false });

        window.addEventListener('touchstart', (e) => {
            if(isPlaying) {
                isTouching = true;
                updateMousePos(e.touches[0].clientX, e.touches[0].clientY - 40);
            }
        }, { passive: true });
        
        window.addEventListener('touchend', () => isTouching = false);

        // --- 클래스 정의 ---

        // 플레이어 우주선
        class Player {
            constructor() {
                this.x = width / 2;
                this.y = height - 100;
                this.width = 40;
                this.height = 50;
                this.color = '#00ffff';
                this.weaponLevel = 1;
                this.maxHealth = 100;
                this.health = 100;
                this.lastShot = 0;
                this.fireRate = 15; // 작을수록 연사력 높음
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // 엔진 불꽃
                ctx.fillStyle = `rgba(255, 100, 0, ${0.5 + Math.random() * 0.5})`;
                ctx.beginPath();
                ctx.moveTo(-10, this.height/2 - 10);
                ctx.lineTo(10, this.height/2 - 10);
                ctx.lineTo(0, this.height/2 + 10 + Math.random() * 15);
                ctx.fill();

                // 비행기 본체 (삼각형 모양)
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.moveTo(0, -this.height / 2); // 기수 (앞코)
                ctx.lineTo(this.width / 2, this.height / 2); // 우측 날개
                ctx.lineTo(0, this.height / 2 - 10); // 꼬리 안쪽
                ctx.lineTo(-this.width / 2, this.height / 2); // 좌측 날개
                ctx.closePath();
                ctx.fill();

                // 조종석 창문
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(0, -this.height / 4);
                ctx.lineTo(5, 0);
                ctx.lineTo(-5, 0);
                ctx.fill();
                
                ctx.restore();
            }

            update() {
                // 부드럽게 마우스/터치 위치로 따라가기
                this.x += (mouse.x - this.x) * 0.2;
                this.y += (mouse.y - this.y) * 0.2;

                // 화면 밖으로 나가지 않게
                this.x = Math.max(this.width/2, Math.min(width - this.width/2, this.x));
                this.y = Math.max(this.height/2, Math.min(height - this.height/2, this.y));

                // 자동 사격
                this.lastShot++;
                if (this.lastShot >= this.fireRate) {
                    this.shoot();
                    this.lastShot = 0;
                }
            }

            shoot() {
                const speed = -12;
                let dmg = 10 + this.weaponLevel * 2;
                
                // 무기 레벨에 따른 발사 패턴
                if (this.weaponLevel === 1) {
                    bullets.push(new Bullet(this.x, this.y - 20, 0, speed, dmg, '#ffff00'));
                } 
                else if (this.weaponLevel === 2) {
                    bullets.push(new Bullet(this.x - 12, this.y - 10, 0, speed, dmg, '#ffff00'));
                    bullets.push(new Bullet(this.x + 12, this.y - 10, 0, speed, dmg, '#ffff00'));
                }
                else if (this.weaponLevel === 3) {
                    bullets.push(new Bullet(this.x, this.y - 20, 0, speed, dmg, '#00ffff'));
                    bullets.push(new Bullet(this.x - 15, this.y - 5, -1.5, speed, dmg, '#00ffff'));
                    bullets.push(new Bullet(this.x + 15, this.y - 5, 1.5, speed, dmg, '#00ffff'));
                }
                else if (this.weaponLevel === 4) {
                    this.fireRate = 12; // 연사속도 증가
                    bullets.push(new Bullet(this.x - 10, this.y - 15, 0, speed, dmg, '#ff00ff'));
                    bullets.push(new Bullet(this.x + 10, this.y - 15, 0, speed, dmg, '#ff00ff'));
                    bullets.push(new Bullet(this.x - 20, this.y, -2.5, speed, dmg, '#ff00ff'));
                    bullets.push(new Bullet(this.x + 20, this.y, 2.5, speed, dmg, '#ff00ff'));
                }
                else { // 레벨 5 (최대)
                    this.fireRate = 10; 
                    bullets.push(new Bullet(this.x, this.y - 20, 0, speed, dmg, '#ff0000'));
                    bullets.push(new Bullet(this.x - 10, this.y - 10, -1, speed, dmg, '#ff0000'));
                    bullets.push(new Bullet(this.x + 10, this.y - 10, 1, speed, dmg, '#ff0000'));
                    bullets.push(new Bullet(this.x - 20, this.y, -3, speed, dmg, '#ff0000'));
                    bullets.push(new Bullet(this.x + 20, this.y, 3, speed, dmg, '#ff0000'));
                }
            }

            takeDamage(amount) {
                this.health -= amount;
                healthBar.style.width = `${Math.max(0, (this.health / this.maxHealth) * 100)}%`;
                
                // 피격 효과
                createParticles(this.x, this.y, '#ff0000', 10);
                
                if (this.health <= 0) {
                    gameOver();
                }
            }
        }

        // 총알
        class Bullet {
            constructor(x, y, vx, vy, damage, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = 4;
                this.damage = damage;
                this.color = color;
                this.markedForDeletion = false;
            }

            draw() {
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                // 화면 밖으로 나가면 삭제
                if (this.y < -10 || this.y > height + 10 || this.x < -10 || this.x > width + 10) {
                    this.markedForDeletion = true;
                }
            }
        }

        // 적 비행기
        class Enemy {
            constructor() {
                this.radius = Math.random() * 15 + 15; // 15 ~ 30 크기
                this.x = Math.random() * (width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                
                // 레벨에 따른 속도 및 체력 증가
                let speedVariation = Math.random() * 1.5;
                this.vy = enemyBaseSpeed + speedVariation + (level * 0.2);
                this.vx = (Math.random() - 0.5) * 1.5; // 약간 좌우로 움직임
                
                // 크기가 클수록 체력이 높고 느림
                this.maxHealth = Math.floor(this.radius) * (1 + level * 0.5);
                this.health = this.maxHealth;
                this.scoreValue = Math.floor(this.radius) * 10; // 점수
                
                this.color = `hsl(${Math.random() * 60 + 300}, 100%, 50%)`; // 붉은/보라 계열
                this.markedForDeletion = false;
                this.angle = 0;
                this.spinSpeed = (Math.random() - 0.5) * 0.1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                
                ctx.beginPath();
                // 다각형 그리기 (마름모 꼴)
                ctx.moveTo(0, -this.radius);
                ctx.lineTo(this.radius, 0);
                ctx.lineTo(0, this.radius);
                ctx.lineTo(-this.radius, 0);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                // 적 체력바 (데미지 입었을 때만)
                if (this.health < this.maxHealth) {
                    ctx.rotate(-this.angle); // 체력바는 수평 유지
                    ctx.fillStyle = 'red';
                    ctx.fillRect(-this.radius, -this.radius - 10, this.radius * 2, 4);
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(-this.radius, -this.radius - 10, (this.radius * 2) * (this.health / this.maxHealth), 4);
                }

                ctx.restore();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.angle += this.spinSpeed;

                // 벽에 튕기기
                if(this.x < this.radius || this.x > width - this.radius) {
                    this.vx *= -1;
                }

                if (this.y > height + this.radius) {
                    this.markedForDeletion = true;
                }
            }

            takeDamage(amount) {
                this.health -= amount;
                if (this.health <= 0) {
                    this.markedForDeletion = true;
                    addScore(this.scoreValue);
                    createParticles(this.x, this.y, this.color, 15);
                    
                    // 아이템 드랍 로직 (약 15% 확률)
                    if (Math.random() < 0.15) {
                        items.push(new Item(this.x, this.y));
                    }
                }
            }
        }

        // 업그레이드 아이템
        class Item {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 15;
                this.vy = 2;
                this.color = '#ffff00'; // 노란색
                this.markedForDeletion = false;
                this.angle = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                
                // 별/보석 모양
                ctx.beginPath();
                ctx.rect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.fill();
                
                ctx.rotate(-this.angle); // 글자는 똑바로
                ctx.fillStyle = '#000';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('P', 0, 1); // Power up
                
                ctx.restore();
            }

            update() {
                this.y += this.vy;
                this.angle += 0.05;
                if (this.y > height + this.size) {
                    this.markedForDeletion = true;
                }
            }
        }

        // 파티클 (폭발 효과)
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 3 + 1;
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 4 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.02; // 사라지는 속도
                this.markedForDeletion = false;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
                if (this.alpha <= 0) {
                    this.markedForDeletion = true;
                }
            }
        }

        // 플로팅 텍스트 (레벨업, 파워업 안내)
        class FloatingText {
            constructor(text, x, y, color, size = 20) {
                this.text = text;
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = size;
                this.alpha = 1;
                this.vy = -1.5;
                this.markedForDeletion = false;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.font = `bold ${this.size}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.shadowBlur = 5;
                ctx.shadowColor = this.color;
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }

            update() {
                this.y += this.vy;
                this.alpha -= 0.015;
                if (this.alpha <= 0) {
                    this.markedForDeletion = true;
                }
            }
        }

        // 배경 별빛
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.vy = this.size * 0.5; // 큰 별일수록 빨리 움직임 (원근감)
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.3})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
            }
            update(speedMultiplier) {
                this.y += this.vy * speedMultiplier;
                if (this.y > height) {
                    this.y = 0;
                    this.x = Math.random() * width;
                }
            }
        }

        // --- 유틸 함수 ---
        
        let player;

        function initBackground() {
            stars = [];
            for(let i=0; i<100; i++){
                stars.push(new Star());
            }
        }

        function createParticles(x, y, color, amount) {
            for (let i = 0; i < amount; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function addScore(amount) {
            score += amount;
            scoreDisplay.innerText = score;
            
            // 1000점 단위 레벨업 조건
            let nextLevel = Math.floor(score / 1000) + 1;
            if (nextLevel > level) {
                levelUp(nextLevel);
            }
        }

        function levelUp(newLevel) {
            level = newLevel;
            levelDisplay.innerText = level;
            
            // 난이도 상승
            enemySpawnRate = Math.max(20, 60 - (level * 5)); // 적 생성 간격 감소 (최소 20프레임)
            enemyBaseSpeed += 0.3; // 적 기본 이동속도 증가
            
            // 화면 중앙에 레벨업 텍스트 표시
            floatingTexts.push(new FloatingText(`레벨 ${level} 달성!`, width/2, height/2 - 50, '#ff69b4', 40));
            floatingTexts.push(new FloatingText(`난이도 증가!`, width/2, height/2, '#ff69b4', 25));
        }

        // 충돌 감지 (AABB / 원형 혼합 기반 간단한 계산)
        function checkCollision(rect1, rect2) {
            // Player vs Item, Bullet vs Enemy
            // 간소화를 위해 사각형/원형을 대략적인 사각형으로 취급
            let r1x = rect1.x - (rect1.width ? rect1.width/2 : rect1.radius || rect1.size/2);
            let r1y = rect1.y - (rect1.height ? rect1.height/2 : rect1.radius || rect1.size/2);
            let r1w = rect1.width || (rect1.radius*2) || rect1.size;
            let r1h = rect1.height || (rect1.radius*2) || rect1.size;

            let r2x = rect2.x - (rect2.width ? rect2.width/2 : rect2.radius || rect2.size/2);
            let r2y = rect2.y - (rect2.height ? rect2.height/2 : rect2.radius || rect2.size/2);
            let r2w = rect2.width || (rect2.radius*2) || rect2.size;
            let r2h = rect2.height || (rect2.radius*2) || rect2.size;

            return (r1x < r2x + r2w &&
                    r1x + r1w > r2x &&
                    r1y < r2y + r2h &&
                    r1y + r1h > r2y);
        }

        // --- 메인 게임 루프 ---

        function animate() {
            if (!isPlaying) return;

            // 배경 지우기 및 반투명 잔상 효과
            ctx.fillStyle = 'rgba(5, 5, 16, 0.4)';
            ctx.fillRect(0, 0, width, height);

            frameCount++;

            // 배경 별 업데이트
            let speedMultiplier = 1 + (level * 0.1); // 레벨오르면 우주 이동속도 증가 연출
            stars.forEach(star => {
                star.update(speedMultiplier);
                star.draw();
            });

            // 플레이어 그리기/업데이트
            player.update();
            player.draw();

            // 적 생성
            if (frameCount % enemySpawnRate === 0) {
                enemies.push(new Enemy());
            }

            // 아이템 처리
            items.forEach(item => {
                item.update();
                item.draw();
                
                // 플레이어 획득
                if (!item.markedForDeletion && checkCollision(player, item)) {
                    item.markedForDeletion = true;
                    if (player.weaponLevel < 5) {
                        player.weaponLevel++;
                        weaponDisplay.innerText = player.weaponLevel;
                        floatingTexts.push(new FloatingText("무기 강화!", player.x, player.y - 40, '#ffff00'));
                    } else {
                        // 만렙일시 체력 회복 밎 점수
                        player.health = Math.min(player.maxHealth, player.health + 20);
                        healthBar.style.width = `${(player.health / player.maxHealth) * 100}%`;
                        addScore(200);
                        floatingTexts.push(new FloatingText("최대 파워! 체력회복", player.x, player.y - 40, '#00ff00'));
                    }
                }
            });

            // 총알 처리
            bullets.forEach(bullet => {
                bullet.update();
                bullet.draw();
                
                // 적과 충돌
                if(!bullet.markedForDeletion) {
                    enemies.forEach(enemy => {
                        if (!enemy.markedForDeletion && checkCollision(bullet, enemy)) {
                            bullet.markedForDeletion = true;
                            enemy.takeDamage(bullet.damage);
                        }
                    });
                }
            });

            // 적 처리
            enemies.forEach(enemy => {
                enemy.update();
                enemy.draw();
                
                // 플레이어와 충돌 (몸통 박치기)
                if (!enemy.markedForDeletion && checkCollision(player, enemy)) {
                    enemy.markedForDeletion = true;
                    createParticles(enemy.x, enemy.y, enemy.color, 20);
                    player.takeDamage(30); // 충돌 데미지
                }
            });

            // 파티클 처리
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 플로팅 텍스트 처리
            floatingTexts.forEach(ft => {
                ft.update();
                ft.draw();
            });

            // 배열 정리 (가비지 컬렉션 역할)
            items = items.filter(i => !i.markedForDeletion);
            bullets = bullets.filter(b => !b.markedForDeletion);
            enemies = enemies.filter(e => !e.markedForDeletion);
            particles = particles.filter(p => !p.markedForDeletion);
            floatingTexts = floatingTexts.filter(f => !f.markedForDeletion);

            animationId = requestAnimationFrame(animate);
        }

        // --- 게임 제어 함수 ---

        function startGame() {
            // 초기화
            player = new Player();
            bullets = [];
            enemies = [];
            items = [];
            particles = [];
            floatingTexts = [];
            score = 0;
            level = 1;
            frameCount = 0;
            enemySpawnRate = 60;
            enemyBaseSpeed = 2;
            
            // 마우스 위치를 중앙 하단으로 초기화
            mouse.x = width / 2;
            mouse.y = height - 100;

            // UI 업데이트
            scoreDisplay.innerText = score;
            levelDisplay.innerText = level;
            weaponDisplay.innerText = player.weaponLevel;
            healthBar.style.width = '100%';
            
            // 화면 전환
            menuScreen.classList.add('hidden');
            gameUI.classList.remove('hidden');
            
            isPlaying = true;
            initBackground();
            
            // 플로팅 텍스트
            floatingTexts.push(new FloatingText("게임 시작!", width/2, height/2, '#00ffff', 40));

            animate();
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            
            // 게임 UI 숨기고 메뉴 화면 표시
            gameUI.classList.add('hidden');
            menuScreen.classList.remove('hidden');
            
            // 메뉴 화면 내용 변경
            menuTitle.innerText = "게임 오버";
            menuTitle.classList.replace('text-cyan-400', 'text-red-500'); // 색상 변경
            menuDesc.classList.add('hidden');
            finalScoreDiv.classList.remove('hidden');
            finalScoreNum.innerText = score;
            startBtn.innerText = "다시 시작하기";
        }

        // 이벤트 리스너
        startBtn.addEventListener('click', startGame);

        // 초기 화면 설정
        initBackground();
        // 메뉴 화면 뒤로 별빛이 보이도록 빈 루프 실행
        function bgLoop() {
            if(!isPlaying) {
                ctx.fillStyle = '#050510';
                ctx.fillRect(0, 0, width, height);
                stars.forEach(star => {
                    star.update(1);
                    star.draw();
                });
                requestAnimationFrame(bgLoop);
            }
        }
        bgLoop();

    </script>
</body>
</html>
